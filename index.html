<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx Payment Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #f8f9fa;
            --text-dim: #a0a0a0;
            --onyx-blue: #00e5ff;
            --onyx-purple: #b026ff;
            --onyx-green: #39ff14;
            --onyx-silver: #c0c0c0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: auto; }
        
        header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { margin: 0; color: var(--onyx-blue); }

        /* Strategy Key */
        .info-box {
            background-color: rgba(0, 229, 255, 0.1);
            border-left: 5px solid var(--onyx-blue);
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        input[type="range"] { width: 100%; accent-color: var(--onyx-blue); }
        .val { font-weight: bold; color: var(--onyx-blue); }

        /* Metrics */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .m-label { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 10px; }
        .m-value { font-size: 1.8rem; font-weight: bold; }

        /* Table Area */
        .table-container {
            max-height: 350px;
            overflow-y: auto;
            background: var(--card-bg);
            border-radius: 8px;
            margin-top: 30px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { position: sticky; top: 0; background: #2a2a2a; padding: 12px; font-size: 0.85rem; color: var(--text-dim); }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 0.9rem; }

        canvas { background: var(--card-bg); border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ Onyx Payment Hub</h1>
        <p>36-Month Capital Arbitrage Dashboard</p>
    </header>

    <div class="info-box" id="strategyKey">
        </div>

    <div class="controls">
        <div>
            <label>Monthly Replenishment: $<span id="repVal" class="val">600</span></label>
            <input type="range" id="repInput" min="450" max="650" value="600" step="10">
        </div>
        <div>
            <label>Combined Tax Rate: <span id="taxVal" class="val">33</span>%</label>
            <input type="range" id="taxInput" min="10" max="50" value="33" step="1">
        </div>
        <div>
            <label>Recovery Contribution: $<span id="recVal" class="val">500</span></label>
            <input type="range" id="recInput" min="400" max="600" value="500" step="10">
        </div>
    </div>

    <div class="metrics">
        <div class="metric-card">
            <div class="m-label">Final HYSA Pool</div>
            <div id="metric-hysa" class="m-value" style="color: var(--onyx-blue);">$0</div>
        </div>
        <div class="metric-card">
            <div class="m-label">After-Tax Net Profit</div>
            <div id="metric-profit" class="m-value" style="color: var(--onyx-green);">$0</div>
        </div>
        <div class="metric-card">
            <div class="m-label">Interest Cost</div>
            <div id="metric-cost" class="m-value" style="color: var(--onyx-purple);">$0</div>
        </div>
        <div class="metric-card">
            <div class="m-label">Equity Crossover</div>
            <div id="metric-equity" class="m-value" style="color: var(--onyx-silver);">TBD</div>
        </div>
    </div>

    <canvas id="crossoverChart" height="120"></canvas>

    <div class="table-container">
        <table id="amortTable">
            <thead>
                <tr>
                    <th>Payment Date</th>
                    <th>Loan Balance</th>
                    <th>Forester Value</th>
                    <th>HYSA Balance</th>
                    <th>Net Spread</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <h2 style="margin-top: 50px;">🔄 Recovery Tracker</h2>
    <div class="metric-card" id="recoveryStats" style="text-align: left;">
        </div>
</div>

<script>
    const loanPrincipal = 38500;
    const loanApr = 0.009;
    const loanMonths = 36;
    const monthlyPayment = 1084.31;
    const hysaInitial = 22000;
    const hysaApy = 0.0325;
    const initialVehicleValue = 35500;
    const annualDepreciation = 0.15;
    const startDate = new Date(2026, 4, 15); // May 15, 2026

    let chart;

    function formatCurr(num) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num); }

    function runEngine() {
        const replenishment = parseFloat(document.getElementById('repInput').value);
        const taxRate = parseFloat(document.getElementById('taxInput').value) / 100;
        const recoveryContrib = parseFloat(document.getElementById('recInput').value);
        const effectiveApy = hysaApy * (1 - taxRate);

        let currentLoan = loanPrincipal;
        let currentHysa = hysaInitial;
        let currentVehicle = initialVehicleValue;
        let totalLoanInt = 0;
        let totalHysaIntNet = 0;

        const data = { labels: [], loan: [], hysa: [], vehicle: [], spread: [] };
        let equityCross = "Not Reached";
        let capitalCross = "Not Reached";

        const tbody = document.querySelector('#amortTable tbody');
        tbody.innerHTML = '';

        for (let i = 0; i < loanMonths; i++) {
            let intPay = currentLoan * (loanApr / 12);
            let princPay = monthlyPayment - intPay;
            currentLoan -= princPay;
            totalLoanInt += intPay;

            let hysaIntNet = currentHysa * (effectiveApy / 12);
            currentHysa = currentHysa - monthlyPayment + replenishment + hysaIntNet;
            totalHysaIntNet += hysaIntNet;

            currentVehicle *= (1 - (annualDepreciation / 12));

            let d = new Date(startDate);
            d.setMonth(startDate.getMonth() + i);
            let dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            if (currentLoan < currentVehicle && equityCross === "Not Reached") equityCross = dateStr;
            if (currentHysa > currentLoan && capitalCross === "Not Reached") capitalCross = dateStr;

            data.labels.push(dateStr);
            data.loan.push(Math.max(0, currentLoan).toFixed(2));
            data.hysa.push(currentHysa.toFixed(2));
            data.vehicle.push(currentVehicle.toFixed(2));
            
            let row = tbody.insertRow();
            row.innerHTML = `<td>${dateStr}</td><td>${formatCurr(currentLoan)}</td><td>${formatCurr(currentVehicle)}</td><td>${formatCurr(currentHysa)}</td><td>${formatCurr(totalHysaIntNet - totalLoanInt)}</td>`;
        }

        // Metrics
        document.getElementById('metric-hysa').innerText = formatCurr(currentHysa);
        document.getElementById('metric-profit').innerText = formatCurr(totalHysaIntNet - totalLoanInt);
        document.getElementById('metric-cost').innerText = formatCurr(totalLoanInt);
        document.getElementById('metric-equity').innerText = equityCross;
        
        document.getElementById('strategyKey').innerHTML = `
            <strong>🔑 Core Blueprint</strong><br>
            • Starting Capital Pool: ${formatCurr(hysaInitial)}<br>
            • Auto-Pay Draw: ${formatCurr(monthlyPayment)} (15th of the month)<br>
            • Capital Crossover (HYSA > Debt): <strong>${capitalCross}</strong>
        `;

        // Recovery Math
        let recBal = currentHysa;
        let recMonths = 0;
        let recDate = new Date(startDate);
        recDate.setMonth(startDate.getMonth() + 35);

        while (recBal < hysaInitial && recMonths < 120) {
            recBal += recoveryContrib + (recBal * (effectiveApy / 12));
            recMonths++;
            recDate.setMonth(recDate.getMonth() + 1);
        }

        document.getElementById('recoveryStats').innerHTML = `
            Target Capital: <strong>${formatCurr(hysaInitial)}</strong> | 
            Recovery Months: <strong>${recMonths}</strong> | 
            Full Recovery Date: <strong>${recDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</strong>
        `;

        updateChart(data);
    }

    function updateChart(data) {
        const ctx = document.getElementById('crossoverChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [
                    { label: 'Loan Balance', data: data.loan, borderColor: '#b026ff', borderWidth: 3, fill: false, tension: 0.1 },
                    { label: 'HYSA Balance', data: data.hysa, borderColor: '#00e5ff', borderWidth: 3, fill: false, tension: 0.1 },
                    { label: 'Forester Value', data: data.vehicle, borderColor: '#c0c0c0', borderDash: [5, 5], borderWidth: 2, fill: false }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { ticks: { color: '#a0a0a0' }, grid: { display: false } },
                    y: { ticks: { color: '#a0a0a0', callback: value => '$' + value.toLocaleString() }, grid: { color: '#333' } }
                },
                plugins: { legend: { labels: { color: '#f8f9fa' } } }
            }
        });
    }

    // Event Listeners
    ['repInput', 'taxInput', 'recInput'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            document.getElementById(id.replace('Input', 'Val')).innerText = e.target.value;
            runEngine();
        });
    });

    runEngine();
</script>
</body>
</html>
