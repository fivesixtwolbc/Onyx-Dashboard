<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx Payment Hub & Savings Booster</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #f8f9fa;
            --text-dim: #a0a0a0; --onyx-blue: #00e5ff; --onyx-purple: #b026ff;
            --onyx-green: #39ff14; --onyx-silver: #c0c0c0; --onyx-gold: #ffcc00;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .info-box { background-color: rgba(0, 229, 255, 0.1); border-left: 5px solid var(--onyx-blue); padding: 15px; margin-bottom: 30px; border-radius: 4px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        input[type="range"] { width: 100%; accent-color: var(--onyx-blue); }
        .val { font-weight: bold; color: var(--onyx-blue); }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: var(--card-bg); padding: 20px; border-radius: 8px; text-align: center; }
        .m-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; }
        .m-value { font-size: 1.5rem; font-weight: bold; }
        .table-container { max-height: 350px; overflow-y: auto; background: var(--card-bg); border-radius: 8px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { position: sticky; top: 0; background: #2a2a2a; padding: 12px; font-size: 0.85rem; color: var(--text-dim); }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ Onyx Hub + Savings Booster</h1>
        <p>Gabriel & Caitlynn's Strategic Capital Dashboard</p>
    </header>

    <div class="info-box" id="strategyKey"></div>

    <div class="controls">
        <div>
            <label>Payment Hub Replenishment: $<span id="repVal" class="val">600</span></label>
            <input type="range" id="repInput" min="450" max="650" value="600" step="10">
        </div>
        <div>
            <label>Tax Bracket (Combined): <span id="taxVal" class="val">33</span>%</label>
            <input type="range" id="taxInput" min="10" max="45" value="33" step="1">
        </div>
        <div>
            <label>Savings Pot 2 (Separated): $<span id="savVal" class="val">25000</span></label>
            <input type="range" id="savInput" min="0" max="30000" value="25000" step="1000">
        </div>
    </div>

    <div class="metrics">
        <div class="metric-card">
            <div class="m-label">Payment Hub (Month 36)</div>
            <div id="m-hysa" class="m-value" style="color: var(--onyx-blue);">$0</div>
        </div>
        <div class="metric-card">
            <div class="m-label">Savings Pot 2 (Month 36)</div>
            <div id="m-sav" class="m-value" style="color: var(--onyx-gold);">$0</div>
        </div>
        <div class="metric-card">
            <div class="m-label">Total Joint Capital</div>
            <div id="m-total" class="m-value" style="color: var(--onyx-green);">$0</div>
        </div>
        <div class="metric-card">
            <div class="m-label">Net Arbitrage Profit</div>
            <div id="m-profit" class="m-value" style="color: var(--onyx-green);">$0</div>
        </div>
    </div>

    <canvas id="crossoverChart" height="100"></canvas>

    <div class="table-container">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Loan Balance</th>
                    <th>Payment Hub ($22k Base)</th>
                    <th>Savings Pot ($25k Base)</th>
                    <th>Total Capital Pool</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const loanPrincipal = 38500, loanApr = 0.009, loanMonths = 36, monthlyPayment = 1084.31;
    const hysaInitial = 22000, hysaApy = 0.0325, startDate = new Date(2026, 4, 15);
    let chart;

    function format(n) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n); }

    function run() {
        const rep = parseFloat(document.getElementById('repInput').value);
        const tax = parseFloat(document.getElementById('taxInput').value) / 100;
        const savStart = parseFloat(document.getElementById('savInput').value);
        const effApy = hysaApy * (1 - tax);

        let curLoan = loanPrincipal, curHysa = hysaInitial, curSav = savStart;
        let totalLoanInt = 0, totalHysaInt = 0, totalSavInt = 0;
        let data = { labels: [], loan: [], hysa: [], sav: [], total: [] };
        const tbody = document.querySelector('#mainTable tbody');
        tbody.innerHTML = '';

        for (let i = 0; i < loanMonths; i++) {
            let lInt = curLoan * (loanApr / 12);
            curLoan -= (monthlyPayment - lInt);
            totalLoanInt += lInt;

            let hInt = curHysa * (effApy / 12);
            curHysa = curHysa - monthlyPayment + rep + hInt;
            totalHysaInt += hInt;

            let sInt = curSav * (effApy / 12);
            curSav += sInt;
            totalSavInt += sInt;

            let d = new Date(startDate); d.setMonth(startDate.getMonth() + i);
            let ds = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

            data.labels.push(ds);
            data.loan.push(Math.max(0, curLoan).toFixed(2));
            data.hysa.push(curHysa.toFixed(2));
            data.sav.push(curSav.toFixed(2));
            data.total.push((curHysa + curSav).toFixed(2));

            let row = tbody.insertRow();
            row.innerHTML = `<td>${ds}</td><td>${format(curLoan)}</td><td>${format(curHysa)}</td><td>${format(curSav)}</td><td>${format(curHysa + curSav)}</td>`;
        }

        document.getElementById('m-hysa').innerText = format(curHysa);
        document.getElementById('m-sav').innerText = format(curSav);
        document.getElementById('m-total').innerText = format(curHysa + curSav);
        document.getElementById('m-profit').innerText = format(totalHysaInt + totalSavInt - totalLoanInt);
        
        document.getElementById('strategyKey').innerHTML = `
            <strong>🔑 Strategic Summary</strong><br>
            • Interest Earned on Pot 1 (Payment Hub): ${format(totalHysaInt)}<br>
            • Interest Earned on Pot 2 (Savings Booster): ${format(totalSavInt)}<br>
            • <strong>Total Passive Income Generated: ${format(totalHysaInt + totalSavInt)}</strong>
        `;

        const ctx = document.getElementById('crossoverChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [
                    { label: 'Loan Balance', data: data.loan, borderColor: '#b026ff', borderWidth: 2, fill: false },
                    { label: 'Payment Hub', data: data.hysa, borderColor: '#00e5ff', borderWidth: 2, fill: false },
                    { label: 'Savings Booster', data: data.sav, borderColor: '#ffcc00', borderWidth: 2, fill: false },
                    { label: 'Total Capital Pool', data: data.total, borderColor: '#39ff14', borderWidth: 3, fill: false }
                ]
            },
            options: { responsive: true, scales: { y: { ticks: { color: '#a0a0a0', callback: v => '$' + v.toLocaleString() }, grid: { color: '#333' } } } }
        });
    }

    ['repInput', 'taxInput', 'savInput'].forEach(id => {
        document.getElementById(id).addEventListener('input', e => {
            document.getElementById(id.replace('Input', 'Val')).innerText = e.target.value;
            run();
        });
    });
    run();
</script>
</body>
</html>
