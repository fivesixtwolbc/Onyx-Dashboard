name: Onyx Daily Alerts

on:
  schedule:
    # Runs at 14:00 UTC every day (7:00 AM Pacific Time)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to run it manually by clicking a button

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Notifier Engine
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: python notifier.py
